<!DOCTYPE html>
<html>
<head>
    <title>Testnet Assets</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f0f0; }
        .asset-box { background: #fff; padding: 20px; border-radius: 10px; width: 300px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; }
        p { font-size: 18px; margin: 5px 0; }
    </style>
</head>
<body>
    <div class="asset-box">
        <h2>Spot Testnet Assets</h2>
        <p id="btc_qty">BTC: ...</p>
        <p id="usdt_qty">USDT: ...</p>
        <p id="btc_price">BTC Price: ...</p>
        <p id="btc_value">BTC Value: ...</p>
        <p id="total_value">Total Value: ...</p>
        <p id="unrealized_pl">P/L: ...</p>
    </div>

    <script>
        async function fetchAssets() {
            try {
                const res = await fetch("/assets");
                const data = await res.json();

                document.getElementById("btc_qty").innerText = `BTC: ${data.BTC_qty}`;
                document.getElementById("usdt_qty").innerText = `USDT: ${data.USDT_qty}`;
                document.getElementById("btc_price").innerText = `BTC Price: ${data.BTC_price.toFixed(2)} USDT`;
                document.getElementById("btc_value").innerText = `BTC Value: ${data.BTC_value.toFixed(2)} USDT`;
                document.getElementById("total_value").innerText = `Total Value: ${data.Total_value.toFixed(2)} USDT`;
                document.getElementById("unrealized_pl").innerText = `P/L: ${data.Unrealized_PL.toFixed(2)} USDT`;
            } catch(err) {
                console.error(err);
            }
        }

        fetchAssets();
        setInterval(fetchAssets, 5000); // refresh every 5 seconds
    </script>
</body>
</html>
