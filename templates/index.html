<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Testnet Assets</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f4f4f4;
        }
        table {
            border-collapse: collapse;
            width: 400px;
        }
        td, th {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: right;
        }
        th {
            background: #eee;
        }
        .green { color: green; }
        .red { color: red; }
    </style>
</head>
<body>

<h2>Binance Testnet Assets</h2>

<table>
<tr><th>Asset</th><th>Value</th></tr>
<tr><td>BTC Qty</td><td id="btc_qty">0</td></tr>
<tr><td>BTC Value</td><td id="btc_value">0</td></tr>
<tr><td>USDT</td><td id="usdt_qty">0</td></tr>
<tr><td>Total</td><td id="total">0</td></tr>
<tr><td>P/L</td><td id="pl">0</td></tr>
</table>

<script>
async function load() {
    const res = await fetch("/assets");
    const d = await res.json();

    document.getElementById("btc_qty").innerText = d.BTC_qty.toFixed(6);
    document.getElementById("btc_value").innerText = d.BTC_value.toFixed(2);
    document.getElementById("usdt_qty").innerText = d.USDT_qty.toFixed(2);
    document.getElementById("total").innerText = d.Total_value.toFixed(2);

    let pl = document.getElementById("pl");
    pl.innerText = d.Unrealized_PL.toFixed(2);
    pl.className = d.Unrealized_PL >= 0 ? "green" : "red";
}

load();
setInterval(load, 5000);
</script>

</body>
</html>
